# Frontend (nginx serving React + proxying /api): Deployment + Service
# This is the ONLY externally-exposed service (NodePort). The browser hits
# this; nginx inside it serves the app and proxies API calls to the backend.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: qft-frontend:latest
          imagePullPolicy: Never   # use the image built into Minikube's Docker
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080   # fixed external port so the demo URL is predictable
  # NodePort exposes this service on the Minikube node's IP at port 30080,
  # reachable from the browser via `minikube service frontend --url`.
  type: NodePort
