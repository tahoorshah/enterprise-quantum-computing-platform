# Nginx config for the frontend container.
# Serves the built React static files AND reverse-proxies API calls to the
# backend service inside Kubernetes. The browser only ever talks to this
# single entry point - it never contacts the backend, Postgres, or Redis
# directly (those stay ClusterIP-internal).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React single-page app. For any route that isn't a real file,
    # fall back to index.html so client-side navigation works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend.
    # "backend" is the Kubernetes Service name; K8s DNS resolves it to the
    # backend pod's cluster IP. Port 8000 matches the backend Service port.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # QAOA/VQE runs can take a while
    }

    # Also proxy the health endpoint (used by the frontend status indicator)
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}
