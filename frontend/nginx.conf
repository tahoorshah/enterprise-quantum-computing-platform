# Nginx config for the frontend container.
# Serves the built React static files AND reverse-proxies API calls to the
# backend service inside Kubernetes. The browser only ever talks to this
# single entry point - it never contacts the backend, Postgres, or Redis
# directly (those stay ClusterIP-internal).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Kubernetes DNS resolver. Resolving the backend host through a variable
    # (below) with an explicit resolver means nginx resolves "backend" at
    # REQUEST time, not at startup. This prevents nginx from crashing on boot
    # if the backend Service isn't resolvable yet (e.g. pods starting in
    # parallel) - it starts cleanly and resolves the upstream on demand.
    # 10.96.0.10 is the standard kube-dns / CoreDNS ClusterIP.
    resolver 10.96.0.10 valid=10s ipv6=off;

    # Serve the React single-page app. For any route that isn't a real file,
    # fall back to index.html so client-side navigation works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend.
    # "backend" is the Kubernetes Service name; K8s DNS resolves it to the
    # backend pod's cluster IP. Port 8000 matches the backend Service port.
    # Using a variable ($backend) forces request-time DNS resolution.
    location /api/ {
        set $backend "http://backend:8000";
        proxy_pass $backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # QAOA/VQE runs can take a while
    }

    # Also proxy the health endpoint (used by the frontend status indicator)
    location /health {
        set $backend_health "http://backend:8000";
        proxy_pass $backend_health/health;
        proxy_set_header Host $host;
    }
}
